<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!--
    OxSteed brand icon
    4-arrow clockwise ring  (outer r=218, inner r=178)
    Inner filled circle     (r=145)
    OxS text + ECG line     (white on orange)
    Dark-navy square bg     (#16213e)

    Arrow arcs: each 75° with 15° gap for arrowhead
      Arc 1: 262.5° → 337.5°   tip ≈ 349°
      Arc 2: 352.5° → 67.5°    tip ≈ 79°
      Arc 3: 82.5°  → 157.5°   tip ≈ 169°
      Arc 4: 172.5° → 247.5°   tip ≈ 259°
    (angles: 0° = 12 o'clock, clockwise)
  -->

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="88" fill="#16213e"/>

  <!-- ── Arrow 1 (upper-left → upper-right, tip at top) ──────────────── -->
  <!--
    Outer start 262.5°: (40, 285)   Outer end 337.5°: (173, 55)
    Tip ~349°:          (211, 26)
    Inner end 337.5°:   (188, 92)   Inner start 262.5°: (80, 279)
  -->
  <path d="
    M 40 285
    A 218 218 0 0 1 173 55
    L 211 26
    A 178 178 0 0 0 80 279
    Z"
    fill="#F97316"/>

  <!-- ── Arrow 2 (upper-right → right, tip at right) ─────────────────── -->
  <!--
    Outer start 352.5°: (228, 40)   Outer end 67.5°: (457, 173)
    Tip ~79°:           (486, 211)
    Inner end 67.5°:    (421, 188)  Inner start 352.5°: (233, 80)
  -->
  <path d="
    M 228 40
    A 218 218 0 0 1 457 173
    L 486 211
    A 178 178 0 0 0 233 80
    Z"
    fill="#F97316"/>

  <!-- ── Arrow 3 (right → lower-right, tip at bottom) ────────────────── -->
  <!--
    Outer start 82.5°: (472, 228)   Outer end 157.5°: (339, 457)
    Tip ~169°:         (301, 486)
    Inner end 157.5°:  (324, 421)   Inner start 82.5°: (433, 233)
  -->
  <path d="
    M 472 228
    A 218 218 0 0 1 339 457
    L 301 486
    A 178 178 0 0 0 433 233
    Z"
    fill="#F97316"/>

  <!-- ── Arrow 4 (lower-left → left, tip at left) ─────────────────────── -->
  <!--
    Outer start 172.5°: (284, 472)  Outer end 247.5°: (55, 339)
    Tip ~259°:          (26, 301)
    Inner end 247.5°:   (92, 324)   Inner start 172.5°: (279, 433)
  -->
  <path d="
    M 284 472
    A 218 218 0 0 1 55 339
    L 26 301
    A 178 178 0 0 0 279 433
    Z"
    fill="#F97316"/>

  <!-- Inner filled circle -->
  <circle cx="256" cy="256" r="145" fill="#F97316"/>

  <!-- OxS — bold white text, upper portion of inner circle -->
  <text
    x="256" y="236"
    text-anchor="middle"
    dominant-baseline="middle"
    font-family="Arial Black, Arial, Helvetica, system-ui, sans-serif"
    font-weight="900"
    font-size="90"
    fill="#FFFFFF"
  >OxS</text>

  <!-- ECG / heartbeat baseline + spike (white) -->
  <!-- Baseline at y=305, spanning x 131–381 inside the circle -->
  <polyline
    points="
      131,305
      172,305
      184,295
      194,268
      204,326
      214,297
      224,305
      381,305
    "
    fill="none"
    stroke="#FFFFFF"
    stroke-width="7"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
</svg>
