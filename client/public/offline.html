<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#F97316" />
    <title>Offline — OxSteed</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #1a1a2e;
        color: #e2e8f0;
        font-family: 'Inter', system-ui, sans-serif;
        padding: 1.5rem;
        text-align: center;
      }
      .card {
        max-width: 380px;
        width: 100%;
      }
      .icon {
        font-size: 3.5rem;
        margin-bottom: 1.25rem;
      }
      h1 {
        font-size: 1.5rem;
        font-weight: 700;
        margin-bottom: 0.75rem;
        color: #f8fafc;
      }
      p {
        font-size: 0.95rem;
        color: #94a3b8;
        line-height: 1.6;
        margin-bottom: 1.75rem;
      }
      button {
        background: #F97316;
        color: #fff;
        border: none;
        border-radius: 9999px;
        padding: 0.75rem 2rem;
        font-size: 0.95rem;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.15s;
      }
      button:hover { background: #ea6a0a; }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="icon">📡</div>
      <h1>You're offline</h1>
      <p>OxSteed can't reach the internet right now. Check your connection and try again.</p>
      <button onclick="window.location.reload()">Try again</button>
    </div>
  </body>
</html>
